# Global application settings
app:
  name: cam
  data_dir: /data/frames
  models_dir: /app/models
  log_dir: /app/logs
  log_level: INFO
  debug: false
  ffmpeg_read_attempts: 1024

general:
  cleanup_interval_seconds: 300     # periodic orphan cleanup
  stats_log_interval_seconds: 30    # periodic STATS log
  health_port: 8090

database:
  host: localhost
  port: 5432
  name: cam
  user: cam
  password: ""

mqtt:
  enabled: false                    # MQTT integration (requires paho-mqtt)
  host: localhost
  port: 1883
  client_id: cam-analyzer
  topic_prefix: cam

detector:
  model: yolo11m.pt
  device: cpu
  confidence: 0.35
  iou: 0.45
  imgsz: 640
  workers: 4
  backend: torch
  classes: [0, 1, 2, 3, 5, 7]
  min_bbox_size: 40

tracker:
  max_age: 30
  n_init: 3
  nn_budget: 100
  depart_timeout: 10.0
  frame_buffer_size: 30            # frames buffered for best entry/exit selection

motion:
  threshold: 0.005
  skip_seconds: 0.0
  method: mog2
  resize_to: [640, 360]

lpr:
  enabled: true
  min_confidence: 0.6
  plate_size: n

face:
  enabled: true
  min_confidence: 0.5
  search_threshold: 0.6

vmr:
  enabled: true                     # vehicle make & model recognition (CLIP)
  min_confidence: 0.3               # minimum similarity score for brand match

dataset:
  crop_enabled: true
  crop_interval: 60

training:
  enabled: true
  min_samples_per_class: 30
  min_show_frames: 5               # groups with fewer frames hidden in UI
  epochs: 30
  batch_size: 8
  imgsz: 1280
  base_model: yolo11m.pt

ui:
  page_size: 23
  auto_refresh_seconds: 30
  live_refresh_seconds: 5
