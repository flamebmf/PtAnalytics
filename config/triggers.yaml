triggers:
  - name: "alert_boss_car"
    description: "Машина начальника на территории"
    type: plate
    values:
      - "A123BC"
      - "M456OO"
    actions:
      - type: webhook
        url: "http://localhost:9000/alert"
        method: POST
        headers:
          Content-Type: application/json
      - type: mqtt
        topic: "cam/alerts/boss_car"
        qos: 1
      - type: log
        level: WARNING

  - name: "known_faces"
    description: "Известные лица из базы"
    type: face
    source_db: true                      # search in DB for matching faces
    values: []                           # если source_db=true — искать в БД
    actions:
      - type: webhook
        url: "http://localhost:9000/face"
        method: POST
        headers:
          Content-Type: application/json
      - type: log
        level: INFO

  - name: "any_car"
    description: "Любой автомобиль"
    type: class
    once_per_object: true
    values: ["car", "truck", "bus", "motorcycle"]
    actions:
      - type: log
        level: INFO
