# Global application settings
app:
  name: cam
  data_dir: /data/frames          # frame image storage
  models_dir: /app/models         # YOLO, InsightFace models cache
  log_dir: /app/logs              # log files storage
  log_level: INFO
  debug: false
  ffmpeg_read_attempts: 1024      # OpenCV FFmpeg max reads per frame (increase for streams with audio)

database:
  host: localhost                    # переопределяется через DB_HOST env
  port: 5432                         # переопределяется через DB_PORT env
  name: cam                          # переопределяется через DB_NAME env
  user: cam                          # переопределяется через DB_USER env
  password: ""                       # переопределяется через DB_PASSWORD env

mqtt:
  host: localhost                    # переопределяется через MQTT_HOST env
  port: 1883                         # переопределяется через MQTT_PORT env
  client_id: cam-analyzer
  topic_prefix: cam

detector:
  model: yolo11s.pt               # YOLO model: n/s/m/l/x
  device: cpu                     # cpu, cuda:0, mps
  confidence: 0.55
  iou: 0.45
  imgsz: 1280
  workers: 4
  backend: openvino             # torch, openvino
  classes: [0, 1, 2, 3, 5, 7]   # person, bicycle, car, motorcycle, bus, truck

tracker:
  max_age: 30                     # frames to keep dead tracks
  n_init: 3                       # confirmations needed
  nn_budget: 100
  depart_timeout: 10.0            # seconds after a track disappears to fire departed event

motion:
  threshold: 0.15                 # fraction of changed pixels to trigger
  skip_seconds: 0.0               # minimum interval between processed frames
  method: mog2                    # mog2 or frame_diff
  resize_to: [640, 360]           # resize frame for motion detection

lpr:
  enabled: true
  min_confidence: 0.6

face:
  enabled: true
  min_confidence: 0.5
  search_threshold: 0.6           # cosine similarity threshold for face match
